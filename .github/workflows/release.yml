name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: auto-release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm
          cache-dependency-path: raycast-extension/package-lock.json

      - name: Install Raycast extension dependencies
        run: npm ci
        working-directory: raycast-extension

      - name: Compute release version
        id: version
        run: |
          VERSION=$(node scripts/next-release-version.mjs)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Run repository tests
        run: npm test

      - name: Lint Raycast extension
        run: npm run lint:extension

      - name: Build Raycast extension
        run: npm run build:extension

      - name: Package release artifact
        run: |
          mkdir -p releases
          cd raycast-extension/dist
          zip -qr "../../releases/claude-raycast-notifier-${{ steps.version.outputs.tag }}.zip" .

      - name: Package install bundle
        run: |
          rm -rf bundle
          mkdir -p bundle
          cp README.md bundle/README.md
          mkdir -p bundle/config bundle/hooks bundle/raycast-extension bundle/scripts
          cp -R config/. bundle/config/
          cp -R hooks/. bundle/hooks/
          cp scripts/install.sh bundle/scripts/install.sh
          rsync -a --exclude node_modules --exclude raycast-env.d.ts raycast-extension/ bundle/raycast-extension/
          cd bundle
          zip -qr "../releases/ai-hook-notifier-bundle-${{ steps.version.outputs.tag }}.zip" .
          cp "../releases/ai-hook-notifier-bundle-${{ steps.version.outputs.tag }}.zip" "../releases/ai-hook-notifier-bundle-latest.zip"

      - name: Build release notes
        run: node scripts/release-notes.mjs "${{ github.event.before }}" "${{ github.sha }}" "${{ steps.version.outputs.tag }}" > release-notes.md

      - name: Create release tag
        run: |
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: release-notes.md
          files: |
            releases/claude-raycast-notifier-${{ steps.version.outputs.tag }}.zip
            releases/ai-hook-notifier-bundle-${{ steps.version.outputs.tag }}.zip
            releases/ai-hook-notifier-bundle-latest.zip
